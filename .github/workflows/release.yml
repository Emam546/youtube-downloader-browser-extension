name: Release
on:
  release:
    types:
      - created
  workflow_dispatch:
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Extension
        run: npm run build

      - name: Generate Crx
        run: npx crx pack .output/chrome-mv3 

      - name: Zip Extension
        run: npm run zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/*.zip
            *.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}